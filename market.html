<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>오이장터 — 강화포도책방</title>
  <meta name="color-scheme" content="light only" />
  <meta name="description" content="강화포도책방 오이장터. 책과 소품을 사고파는 따뜻한 동네 장터." />
  <link rel="stylesheet" href="style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet" />
</head>
<body>

  <!-- 헤더 -->
  <header class="header scrolled" id="header">
    <div class="container header__inner">
      <a href="index.html" class="header__logo">
        <img src="images/logo.png" alt="강화 포도책방" class="header__logo-img" />
        <span class="header__logo-text">강화포도책방</span>
      </a>
      <nav class="header__nav" id="headerNav">
        <a href="index.html#news">소식</a>
        <a href="journal.html">책방일지</a>
        <a href="program.html">프로그램</a>
        <a href="story.html">나의 책방이야기</a>
        <a href="market.html" class="active">오이장터</a>
        <a href="index.html#pricing">입점</a>
      </nav>
      <div class="header__actions">
        <a href="index.html#pricing" class="btn btn--outline">점주 신청</a>
      </div>
      <button class="header__toggle" id="menuToggle" aria-label="메뉴 열기">
        <span></span><span></span><span></span>
      </button>
    </div>
  </header>

  <!-- 페이지 히어로 -->
  <section class="page-hero">
    <div class="container page-hero__inner">
      <p class="page-hero__eyebrow">Oi Market</p>
      <h1 class="page-hero__title">오이장터</h1>
      <p class="page-hero__desc">책과 소품, 핸드메이드 작품이 오가는<br />강화포도책방의 따뜻한 동네 장터.</p>
    </div>
  </section>

  <!-- 준비 중 안내 -->
  <section class="section">
    <div class="container">
      <div class="coming-soon">
        <div class="coming-soon__icon">🛖</div>
        <h2 class="coming-soon__title">오이장터 준비 중입니다</h2>
        <p class="coming-soon__desc">책, 소품, 핸드메이드 작품을 사고팔 수 있는<br />오이장터를 곧 열겠습니다.</p>
        <a href="index.html" class="btn btn--primary">메인으로 돌아가기</a>
      </div>
    </div>
  </section>

  <!-- 푸터 -->
  <footer class="footer">
    <div class="footer__bottom">
      <div class="container">
        <p>© 2026 강화포도책방. All rights reserved.</p>
      </div>
    </div>
  </footer>

  <script src="script.js"></script>
</body>
</html>
