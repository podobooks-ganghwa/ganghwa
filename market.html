<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="color-scheme" content="light only" />
  <title>오이장터 — 강화포도책방</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet" />
  <style>
    .pg-hero{background:linear-gradient(135deg,#3d2800 0%,#92400e 60%,#f59e0b 100%);color:#fff;padding:140px 0 80px;text-align:center}
    .pg-hero__eye{font-size:.8rem;font-weight:700;letter-spacing:.2em;text-transform:uppercase;color:rgba(255,255,255,.6);margin-bottom:16px}
    .pg-hero__title{font-size:clamp(2.2rem,5vw,3.5rem);font-weight:900;margin-bottom:12px}
    .pg-hero__sub{font-size:1rem;color:rgba(255,255,255,.8)}
    .pg-section{padding:80px 0 120px;background:#fff}
    .filter-bar{max-width:960px;margin:0 auto 32px;display:flex;gap:8px;flex-wrap:wrap}
    .filter-btn{padding:6px 18px;border:2px solid #e5e7eb;border-radius:50px;background:#fff;font-size:.82rem;font-weight:700;cursor:pointer;transition:all .2s;font-family:inherit;color:#6b7280}
    .filter-btn.active,.filter-btn:hover{border-color:#f59e0b;background:#fffbeb;color:#b45309}
    .pg-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:20px;max-width:960px;margin:0 auto}
    .pg-empty{text-align:center;padding:80px 20px;color:#6b7280;max-width:960px;margin:0 auto}
    .pg-empty__icon{font-size:3rem;margin-bottom:16px}
    .item-card{background:#fff;border:1px solid #fde68a;border-radius:20px;padding:22px;box-shadow:0 4px 20px rgba(245,158,11,.08);position:relative;overflow:hidden}
    .item-card.sold::after{content:'판매완료';position:absolute;top:0;left:0;right:0;bottom:0;background:rgba(255,255,255,.8);display:flex;align-items:center;justify-content:center;font-size:1.3rem;font-weight:900;color:#9ca3af;border-radius:20px}
    .item-card__cat{display:inline-flex;align-items:center;gap:5px;font-size:.72rem;font-weight:700;padding:3px 10px;border-radius:50px;background:#fffbeb;color:#b45309;border:1px solid #fde68a;margin-bottom:12px}
    .item-card__emoji{font-size:2.2rem;margin-bottom:8px;display:block}
    .item-card__title{font-size:1rem;font-weight:900;color:#1a1a2e;margin-bottom:6px}
    .item-card__price{font-size:1.1rem;font-weight:900;color:#b45309;margin-bottom:8px}
    .item-card__price.free{color:#059669}
    .item-card__desc{font-size:.85rem;color:#6b7280;line-height:1.7;white-space:pre-wrap}
    .item-card__desc.collapsed{display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden}
    .item-card__toggle{font-size:.75rem;font-weight:700;color:#b45309;background:none;border:none;cursor:pointer;padding:4px 0 0;font-family:inherit}
    .item-card__footer{margin-top:12px;display:flex;justify-content:space-between;align-items:center}
    .item-card__seller{font-size:.78rem;color:#9ca3af;font-weight:600}
    .item-card__date{font-size:.72rem;color:#d1d5db}
    .admin-panel{background:#fff;border-radius:24px;width:100%;max-width:580px;max-height:90vh;overflow-y:auto;box-shadow:0 16px 60px rgba(0,0,0,.2)}
    .admin-panel__hd{display:flex;align-items:center;justify-content:space-between;padding:24px 28px 0}
    .admin-panel__title{font-size:1.1rem;font-weight:900;color:#1a1a2e}
    .admin-panel__close{background:none;border:none;font-size:1.4rem;cursor:pointer;color:#6b7280;padding:4px;line-height:1}
    .admin-panel__body{padding:20px 28px 28px}
    .aform{display:flex;flex-direction:column;gap:14px}
    .aform label{font-size:.8rem;font-weight:700;color:#6b7280;display:block;margin-bottom:4px}
    .aform input,.aform textarea,.aform select{width:100%;padding:10px 14px;border:2px solid #e5e7eb;border-radius:10px;font-size:.9rem;font-family:inherit;outline:none;transition:border-color .2s;background:#fff;box-sizing:border-box}
    .aform input:focus,.aform textarea:focus,.aform select:focus{border-color:#f59e0b}
    .aform textarea{height:90px;resize:vertical;line-height:1.7}
    .aform__row2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
    .aform__row3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
    .aform__submit{padding:12px;background:#f59e0b;color:#fff;border:none;border-radius:10px;font-size:.9rem;font-weight:700;cursor:pointer;font-family:inherit;transition:background .2s}
    .aform__submit:hover{background:#d97706}
    .aform__submit:disabled{background:#fcd34d;cursor:not-allowed}
    .adivider{border:none;border-top:1px solid #fef3c7;margin:18px 0}
    .alist{display:flex;flex-direction:column;gap:8px}
    .aitem{display:flex;align-items:center;gap:10px;padding:8px 12px;background:#fffbeb;border-radius:8px;font-size:.85rem}
    .aitem__date{color:#b45309;font-weight:700;white-space:nowrap;font-size:.78rem}
    .aitem__title{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:#1a1a2e}
    .aitem__del{background:none;border:1px solid #fca5a5;color:#ef4444;border-radius:6px;padding:2px 8px;font-size:.75rem;cursor:pointer;white-space:nowrap;font-family:inherit}
    .aitem__del:hover{background:#fee2e2}
    .save-status{font-size:.82rem;text-align:center;padding:6px;border-radius:8px;display:none;margin-bottom:4px}
    .save-status.success{display:block;background:#dcfce7;color:#166534}
    .save-status.error{display:block;background:#fee2e2;color:#991b1b}
    .save-status.loading{display:block;background:#fef3c7;color:#b45309}
    .emoji-row{display:flex;flex-wrap:wrap;gap:6px;padding:8px;border:2px solid #e5e7eb;border-radius:10px}
    .emoji-row:focus-within{border-color:#f59e0b}
    .eopt{font-size:1.2rem;cursor:pointer;padding:4px;border-radius:6px;transition:background .15s;border:2px solid transparent}
    .eopt:hover{background:#fffbeb}
    .eopt.sel{border-color:#f59e0b;background:#fffbeb}
    .modal-overlay{position:fixed;inset:0;background:rgba(26,26,46,.55);backdrop-filter:blur(4px);z-index:600;display:flex;align-items:center;justify-content:center;padding:20px;opacity:0;pointer-events:none;transition:opacity .25s}
    .modal-overlay.open{opacity:1;pointer-events:auto}
    .pw-modal{background:#fff;border-radius:20px;padding:40px;width:100%;max-width:360px;text-align:center;box-shadow:0 16px 60px rgba(0,0,0,.2)}
    .pw-modal__icon{font-size:2.5rem;margin-bottom:14px}
    .pw-modal__title{font-size:1.1rem;font-weight:900;margin-bottom:6px;color:#1a1a2e}
    .pw-modal__sub{font-size:.85rem;color:#6b7280;margin-bottom:20px}
    .pw-modal__input{width:100%;padding:11px 14px;border:2px solid #e5e7eb;border-radius:10px;font-size:1rem;font-family:inherit;outline:none;margin-bottom:10px;transition:border-color .2s;box-sizing:border-box}
    .pw-modal__input:focus{border-color:#f59e0b}
    .pw-modal__error{font-size:.8rem;color:#ef4444;margin-bottom:8px}
    .pw-modal__btn{width:100%;padding:12px;background:#f59e0b;color:#fff;border:none;border-radius:10px;font-size:.9rem;font-weight:700;cursor:pointer;font-family:inherit}
    .pw-modal__btn:hover{background:#d97706}
    .admin-fab{position:fixed;bottom:32px;right:32px;width:52px;height:52px;border-radius:50%;background:#f59e0b;color:#fff;font-size:1.2rem;border:none;cursor:pointer;box-shadow:0 4px 20px rgba(245,158,11,.45);z-index:500;display:flex;align-items:center;justify-content:center;transition:background .2s,transform .2s}
    .admin-fab:hover{background:#d97706;transform:scale(1.08)}
    @media(max-width:600px){.pg-grid{grid-template-columns:1fr}.aform__row2,.aform__row3{grid-template-columns:1fr}.admin-panel{border-radius:16px 16px 0 0}}
  </style>
</head>
<body>
  <header class="header scrolled" id="header">
    <div class="container header__inner">
      <a href="index.html" class="header__logo">
        <img src="images/logo.png" alt="강화 포도책방" class="header__logo-img" />
        <span class="header__logo-text">강화포도책방</span>
      </a>
      <nav class="header__nav" id="headerNav">
        <a href="index.html#news">소식</a>
        <a href="journal.html">책방일지</a>
        <a href="program.html">프로그램</a>
        <a href="story.html">나의 책방이야기</a>
        <a href="market.html" class="active">오이장터</a>
        <a href="board.html">게시판</a>
        <a href="index.html#pricing">입점</a>
      </nav>
      <div class="header__actions"><a href="index.html#pricing" class="btn btn--outline">점주 신청</a></div>
      <button class="header__toggle" id="menuToggle" aria-label="메뉴 열기"><span></span><span></span><span></span></button>
    </div>
  </header>

  <section class="pg-hero">
    <div class="container">
      <p class="pg-hero__eye">Oi Market</p>
      <h1 class="pg-hero__title">🛖 오이장터</h1>
      <p class="pg-hero__sub">책과 소품, 핸드메이드 작품이 오가는 따뜻한 동네 장터</p>
    </div>
  </section>

  <section class="pg-section">
    <div class="container">
      <div class="filter-bar" id="filterBar">
        <button class="filter-btn active" data-cat="all">전체</button>
        <button class="filter-btn" data-cat="책">📚 책</button>
        <button class="filter-btn" data-cat="소품">🪴 소품</button>
        <button class="filter-btn" data-cat="핸드메이드">🧶 핸드메이드</button>
        <button class="filter-btn" data-cat="기타">🎁 기타</button>
      </div>
      <div id="pgFeed" class="pg-grid"><div class="pg-empty"><div class="pg-empty__icon">🛖</div><p>장터 물품을 불러오는 중이에요…</p></div></div>
    </div>
  </section>

  <footer class="footer footer--deep">
    <div class="footer__bottom"><div class="container"><p>© 2026 강화포도책방. All rights reserved.</p></div></div>
  </footer>

  <!-- 관리자 패널 -->
  <div class="modal-overlay" id="adminOverlay">
    <div class="admin-panel">
      <div class="admin-panel__hd">
        <span class="admin-panel__title">🛖 오이장터 관리</span>
        <button class="admin-panel__close" id="adminClose">✕</button>
      </div>
      <div class="admin-panel__body">
        <form class="aform" id="writeForm">
          <div>
            <label>이모지 선택</label>
            <div class="emoji-row" id="emojiRow">
              <span class="eopt sel" data-e="📚">📚</span><span class="eopt" data-e="🪴">🪴</span><span class="eopt" data-e="🧶">🧶</span>
              <span class="eopt" data-e="🎁">🎁</span><span class="eopt" data-e="🖼️">🖼️</span><span class="eopt" data-e="🧸">🧸</span>
              <span class="eopt" data-e="🕯️">🕯️</span><span class="eopt" data-e="☕">☕</span><span class="eopt" data-e="🌿">🌿</span>
            </div>
          </div>
          <div class="aform__row2">
            <div><label>물품명 *</label><input type="text" id="fTitle" placeholder="예) 고양이 그림책" required maxlength="40" /></div>
            <div>
              <label>카테고리</label>
              <select id="fCat">
                <option value="책">📚 책</option>
                <option value="소품">🪴 소품</option>
                <option value="핸드메이드">🧶 핸드메이드</option>
                <option value="기타">🎁 기타</option>
              </select>
            </div>
          </div>
          <div class="aform__row2">
            <div><label>가격 *</label><input type="text" id="fPrice" placeholder="5,000원 / 무료" required /></div>
            <div>
              <label>상태</label>
              <select id="fStatus">
                <option value="sale">판매중</option>
                <option value="done">판매완료</option>
              </select>
            </div>
          </div>
          <div><label>물품 설명</label><textarea id="fDesc" placeholder="물품에 대한 설명, 상태, 거래 방법 등을 적어주세요"></textarea></div>
          <div class="aform__row2">
            <div><label>판매자</label><input type="text" id="fSeller" placeholder="홍길동 점주" /></div>
            <div><label>등록일</label><input type="date" id="fDate" /></div>
          </div>
          <div><label>사진 첨부 (여러 장 가능)</label><div id="mkImgUploader"></div></div>
          <div id="pgStatus" class="save-status"></div>
          <button type="submit" class="aform__submit" id="submitBtn">물품 등록하기 📤</button>
        </form>
        <hr class="adivider" />
        <label style="font-size:.8rem;font-weight:700;color:#6b7280;display:block;margin-bottom:10px">등록된 물품 관리</label>
        <div class="alist" id="adminList"><p style="font-size:.82rem;color:#9ca3af;text-align:center;padding:10px">불러오는 중...</p></div>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
  <script src="js/admin-common.js"></script>
  <script>
  (function(){
    const PATH = 'data/market.json';
    let selEmoji = '📚';
    let curFilter = 'all';
    let uploader = null;

    document.getElementById('fDate').value = new Date().toISOString().slice(0,10);
    uploader = AC.createUploader('mkImgUploader');

    document.querySelectorAll('.eopt').forEach(el => {
      el.addEventListener('click', () => {
        document.querySelectorAll('.eopt').forEach(e => e.classList.remove('sel'));
        el.classList.add('sel');
        selEmoji = el.dataset.e;
      });
    });

    document.getElementById('filterBar').addEventListener('click', e=>{
      const btn = e.target.closest('.filter-btn');
      if(!btn) return;
      document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
      btn.classList.add('active');
      curFilter = btn.dataset.cat;
      loadAndRender();
    });

    let allItems = [];

    async function loadAndRender() {
      const data = await AC.fetchJSON(PATH);
      allItems = (data && data.items) || [];
      const filtered = curFilter === 'all' ? allItems : allItems.filter(i=>i.category===curFilter);
      renderFeed(filtered);
      return allItems;
    }

    function renderFeed(items) {
      const feed = document.getElementById('pgFeed');
      if (!items.length) {
        const msg = curFilter === 'all'
          ? '아직 등록된 물품이 없어요.<br/>따뜻한 장터가 곧 열립니다!'
          : `'${curFilter}' 카테고리에 등록된 물품이 없어요.`;
        feed.innerHTML = `<div class="pg-empty"><div class="pg-empty__icon">🛖</div><p>${msg}</p></div>`;
        return;
      }
      const sorted = [...items].sort((a,b)=>b.date.localeCompare(a.date));
      feed.innerHTML = sorted.map((m,i) => `
        <article class="item-card ${m.status==='done'?'sold':''}">
          <div class="item-card__cat">${m.category||'기타'}</div>
          <span class="item-card__emoji">${AC.esc(m.emoji||'📦')}</span>
          <div class="item-card__title">${AC.esc(m.title)}</div>
          <div class="item-card__price ${m.price==='무료'?'free':''}">${AC.esc(m.price||'가격문의')}</div>
          ${m.description ? `<div class="item-card__desc collapsed" id="mdes-${i}">${AC.esc(m.description)}</div>
          <button class="item-card__toggle" onclick="togDesc(${i})">더 읽기 ▾</button>` : ''}
          ${AC.imgHtml(m.images)}
          <div class="item-card__footer">
            <span class="item-card__seller">${m.seller ? '🙋 ' + AC.esc(m.seller) : ''}</span>
            <span class="item-card__date">${m.date||''}</span>
          </div>
        </article>`).join('');
    }

    window.togDesc = function(i){
      const el = document.getElementById(`mdes-${i}`);
      const btn = el.nextElementSibling;
      el.classList.toggle('collapsed');
      btn.textContent = el.classList.contains('collapsed') ? '더 읽기 ▾' : '접기 ▴';
    };

    function renderAdminList(items) {
      const list = document.getElementById('adminList');
      if (!items.length) { list.innerHTML = '<p style="font-size:.82rem;color:#9ca3af;text-align:center;padding:10px">등록된 물품이 없어요</p>'; return; }
      const sorted = [...items].sort((a,b)=>b.date.localeCompare(a.date));
      list.innerHTML = sorted.map(m=>`
        <div class="aitem">
          <span class="aitem__date">${m.date}</span>
          <span class="aitem__title">${AC.esc(m.emoji||'')} ${AC.esc(m.title)} (${AC.esc(m.price||'')})</span>
          <button class="aitem__del" onclick="delItem('${m.id}')">삭제</button>
        </div>`).join('');
    }

    window.delItem = async function(id){
      if(!confirm('삭제할까요?')) return;
      AC.setStatus('pgStatus','loading','삭제 중…');
      try {
        const data = await AC.fetchJSON(PATH);
        const items = (data.items||[]).filter(m=>m.id!==id);
        await AC.saveJSON(PATH,{items},`물품 삭제`);
        AC.setStatus('pgStatus','success','삭제 완료!');
        AC.downloadBackup({items}, '오이장터');
        allItems = items;
        const filtered = curFilter==='all' ? items : items.filter(i=>i.category===curFilter);
        renderFeed(filtered); renderAdminList(items);
      } catch(e){ handleErr(e,'pgStatus'); }
    };

    document.getElementById('writeForm').addEventListener('submit', async e=>{
      e.preventDefault();
      const btn = document.getElementById('submitBtn');
      btn.disabled = true;
      AC.setStatus('pgStatus','loading','저장 중…');
      const files = uploader ? uploader.getFiles() : [];
      try {
        let images = [];
        if (files.length > 0) {
          AC.setStatus('pgStatus','loading',`사진 업로드 중… (0/${files.length})`);
          images = await AC.uploadImgs(files, 'market', msg => AC.setStatus('pgStatus','loading',msg));
        }
        const item = {
          id: Date.now().toString(),
          emoji: selEmoji,
          title: document.getElementById('fTitle').value.trim(),
          category: document.getElementById('fCat').value,
          price: document.getElementById('fPrice').value.trim(),
          description: document.getElementById('fDesc').value.trim(),
          seller: document.getElementById('fSeller').value.trim(),
          date: document.getElementById('fDate').value,
          status: document.getElementById('fStatus').value,
          images,
        };
        AC.setStatus('pgStatus','loading','저장 중…');
        const data = await AC.fetchJSON(PATH);
        const items = [...(data.items||[]), item];
        await AC.saveJSON(PATH,{items},`물품 추가: ${item.title}`);
        AC.setStatus('pgStatus','success','✅ 등록 완료! 백업 저장 중…');
        AC.downloadBackup({items}, '오이장터');
        document.getElementById('writeForm').reset();
        document.getElementById('fDate').value = new Date().toISOString().slice(0,10);
        if (uploader) uploader.reset();
        allItems = items;
        setTimeout(() => AC.setStatus('pgStatus','success','✅ 등록 완료! 1~2분 후 반영됩니다.'), 800);
        const filtered = curFilter==='all' ? items : items.filter(i=>i.category===curFilter);
        renderFeed(filtered); renderAdminList(items);
      } catch(e){ handleErr(e,'pgStatus'); }
      finally{ btn.disabled = false; }
    });

    function handleErr(e, sid) {
      if(e.message==='NO_TOKEN'||e.message.includes('401')) {
        AC.setStatus(sid,'error','GitHub 토큰을 입력해주세요');
        AC.promptToken();
      } else {
        AC.setStatus(sid,'error','오류: '+e.message);
      }
    }

    async function openAdmin(){
      document.getElementById('adminOverlay').classList.add('open');
      document.body.style.overflow='hidden';
      const data = await AC.fetchJSON(PATH);
      renderAdminList((data&&data.items)||[]);
    }

    document.getElementById('adminClose').addEventListener('click',()=>{
      document.getElementById('adminOverlay').classList.remove('open');
      document.body.style.overflow='';
    });
    document.getElementById('adminOverlay').addEventListener('click',e=>{
      if(e.target.id==='adminOverlay'){ document.getElementById('adminOverlay').classList.remove('open'); document.body.style.overflow=''; }
    });

    AC.injectModals({ onSuccess: openAdmin });
    loadAndRender();
  })();
  </script>
</body>
</html>
