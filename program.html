<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="color-scheme" content="light only" />
  <title>프로그램 — 강화포도책방</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet" />
  <style>
    html{color-scheme:light}
    .pg-hero{background:linear-gradient(135deg,#1e3a5f 0%,#2563eb 60%,#60a5fa 100%);color:#fff;padding:140px 0 80px;text-align:center}
    .pg-hero__eye{font-size:.8rem;font-weight:700;letter-spacing:.2em;color:rgba(255,255,255,.6);margin-bottom:16px}
    .pg-hero__title{font-size:clamp(2.2rem,5vw,3.5rem);font-weight:900;margin-bottom:12px}
    .pg-hero__sub{font-size:1rem;color:rgba(255,255,255,.75)}
    .pg-section{padding:80px 0 120px;background:#fff}
    .pg-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:24px;max-width:960px;margin:0 auto}
    .pg-empty{text-align:center;padding:80px 20px;color:#6b7280;max-width:960px;margin:0 auto}
    .pg-empty__icon{font-size:3rem;margin-bottom:16px}
    /* 카테고리 */
    .cat-badge{display:inline-block;font-size:.72rem;font-weight:800;padding:3px 10px;border-radius:50px;background:#dbeafe;color:#1d4ed8;letter-spacing:.02em}
    /* 프로그램 카드 */
    .prog-card{background:#fff;border:1px solid #dbeafe;border-radius:20px;padding:24px;box-shadow:0 4px 20px rgba(37,99,235,.07);position:relative;overflow:hidden;cursor:pointer;transition:box-shadow .2s,transform .2s}
    .prog-card:hover{box-shadow:0 8px 30px rgba(37,99,235,.14);transform:translateY(-2px)}
    .prog-card::before{content:'';position:absolute;top:0;left:0;right:0;height:4px;background:linear-gradient(90deg,#2563eb,#60a5fa)}
    .prog-card__status{display:inline-flex;align-items:center;gap:6px;font-size:.72rem;font-weight:700;padding:3px 10px;border-radius:50px;margin-bottom:12px}
    .prog-card__status--open{background:#dbeafe;color:#1d4ed8}
    .prog-card__status--full{background:#fee2e2;color:#b91c1c}
    .prog-card__status--done{background:#f3f4f6;color:#6b7280}
    .prog-card__header{display:flex;gap:12px;align-items:flex-start;margin-bottom:12px}
    .prog-card__cat{font-size:.8rem;font-weight:800;color:#2563eb;background:#eff6ff;padding:2px 10px;border-radius:20px;align-self:flex-start;white-space:nowrap;margin-right:auto}
    .prog-card__title{font-size:1.05rem;font-weight:900;color:#1a1a2e;margin-bottom:3px}
    .prog-card__datetime{font-size:.8rem;color:#2563eb;font-weight:600}
    .prog-card__desc{font-size:.88rem;color:#4b5563;line-height:1.8;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;margin-bottom:12px}
    .prog-card__footer{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px}
    .prog-card__tag{font-size:.75rem;background:#eff6ff;color:#1e40af;padding:3px 8px;border-radius:5px;font-weight:600}
    .prog-card__detail-btn{width:100%;padding:9px;background:#eff6ff;color:#1d4ed8;border:none;border-radius:10px;font-size:.85rem;font-weight:700;cursor:pointer;font-family:inherit;transition:background .2s;margin-top:4px}
    .prog-card__detail-btn:hover{background:#dbeafe}
    .prog-card__posts-count{font-size:.75rem;color:#6b7280;text-align:right;margin-top:6px}
    /* 상세 모달 */
    .detail-overlay{position:fixed;inset:0;background:rgba(26,26,46,.55);backdrop-filter:blur(4px);z-index:700;display:flex;align-items:center;justify-content:center;padding:16px;opacity:0;pointer-events:none;transition:opacity .25s}
    .detail-overlay.open{opacity:1;pointer-events:auto}
    .detail-panel{background:#fff;border-radius:24px;width:100%;max-width:720px;max-height:92vh;overflow-y:auto;box-shadow:0 20px 80px rgba(0,0,0,.25)}
    .detail-hd{background:linear-gradient(135deg,#1e3a5f,#2563eb);color:#fff;padding:28px 28px 24px;border-radius:24px 24px 0 0;position:relative}
    .detail-hd__close{position:absolute;top:16px;right:16px;background:rgba(255,255,255,.15);border:none;color:#fff;width:32px;height:32px;border-radius:50%;cursor:pointer;font-size:1rem;display:flex;align-items:center;justify-content:center}
    .detail-hd__status{display:inline-flex;align-items:center;gap:5px;font-size:.72rem;font-weight:700;padding:3px 10px;border-radius:50px;background:rgba(255,255,255,.2);color:#fff;margin-bottom:10px}
    .detail-hd__cat{display:inline-block;font-size:.75rem;font-weight:800;padding:3px 12px;border-radius:20px;background:rgba(255,255,255,.25);color:#fff;margin-left:8px;vertical-align:middle}
    .detail-hd__title{font-size:1.4rem;font-weight:900;margin-bottom:6px}
    .detail-hd__meta{font-size:.82rem;opacity:.8;display:flex;flex-wrap:wrap;gap:12px}
    .detail-body{padding:0}
    /* 탭 */
    .detail-tabs{display:flex;border-bottom:2px solid #e8f0fe;background:#f8faff;padding:0 16px}
    .detail-tab{padding:12px 16px;font-size:.85rem;font-weight:700;cursor:pointer;border:none;background:none;color:#6b7280;transition:color .15s;white-space:nowrap;border-bottom:2px solid transparent;margin-bottom:-2px}
    .detail-tab.active{color:#2563eb;border-bottom-color:#2563eb}
    .detail-tab:hover:not(.active){color:#374151}
    .detail-pane{display:none;padding:22px 24px}
    .detail-pane.active{display:block}
    .detail-info{background:#f0f7ff;border-radius:14px;padding:18px;margin-bottom:0}
    .detail-info__desc{font-size:.92rem;color:#374151;line-height:1.9;white-space:pre-wrap;margin-bottom:12px}
    .detail-info__tags{display:flex;flex-wrap:wrap;gap:7px}
    .detail-info__tag{font-size:.78rem;background:#dbeafe;color:#1e40af;padding:4px 10px;border-radius:6px;font-weight:600}
    .detail-info__imgs{display:grid;grid-template-columns:repeat(auto-fill,minmax(100px,1fr));gap:4px;border-radius:8px;overflow:hidden;margin-top:12px}
    .detail-info__img{width:100%;aspect-ratio:1;object-fit:cover;cursor:pointer;transition:opacity .15s}
    .detail-info__img:hover{opacity:.85}
    /* 신청란 */
    .apply-box{background:#eff6ff;border-radius:14px;padding:20px;min-height:80px;margin-bottom:14px}
    .apply-box__content{font-size:.92rem;color:#374151;line-height:1.9;white-space:pre-wrap}
    .apply-empty{color:#9ca3af;font-size:.88rem}
    .apply-edit-form{display:none;flex-direction:column;gap:10px;margin-top:10px}
    .apply-edit-form.open{display:flex}
    .apply-edit-form textarea{width:100%;padding:10px 14px;border:2px solid #dbeafe;border-radius:10px;font-size:.9rem;font-family:inherit;height:130px;resize:vertical;line-height:1.7;outline:none;box-sizing:border-box}
    .apply-edit-form textarea:focus{border-color:#2563eb}
    .apply-edit-btns{display:flex;gap:8px;justify-content:flex-end}
    .apply-edit-save{padding:8px 18px;background:#2563eb;color:#fff;border:none;border-radius:8px;font-size:.82rem;font-weight:700;cursor:pointer;font-family:inherit}
    .apply-edit-cancel{padding:8px 14px;background:#f3f4f6;color:#6b7280;border:none;border-radius:8px;font-size:.82rem;cursor:pointer;font-family:inherit}
    .apply-edit-trigger{padding:6px 14px;background:#fff;border:1.5px solid #dbeafe;color:#2563eb;border-radius:8px;font-size:.78rem;font-weight:700;cursor:pointer;font-family:inherit;transition:background .15s}
    .apply-edit-trigger:hover{background:#eff6ff}
    /* 진행결과 */
    .result-add-btn{padding:8px 18px;background:#2563eb;color:#fff;border:none;border-radius:8px;font-size:.82rem;font-weight:700;cursor:pointer;font-family:inherit;margin-bottom:14px}
    .result-add-btn:hover{background:#1d4ed8}
    .result-form{background:#f0f7ff;border-radius:12px;padding:18px;margin-bottom:16px;display:none;flex-direction:column;gap:12px}
    .result-form.open{display:flex}
    .result-form label{font-size:.78rem;font-weight:700;color:#6b7280;display:block;margin-bottom:4px}
    .result-form textarea,.result-form input{width:100%;padding:9px 12px;border:2px solid #dbeafe;border-radius:9px;font-size:.88rem;font-family:inherit;outline:none;transition:border-color .2s;background:#fff;box-sizing:border-box}
    .result-form textarea:focus,.result-form input:focus{border-color:#2563eb}
    .result-form textarea{height:90px;resize:vertical;line-height:1.7}
    .result-form__btns{display:flex;gap:8px;justify-content:flex-end}
    .result-form__submit{padding:8px 18px;background:#2563eb;color:#fff;border:none;border-radius:8px;font-size:.82rem;font-weight:700;cursor:pointer;font-family:inherit}
    .result-form__cancel{padding:8px 14px;background:#f3f4f6;color:#6b7280;border:none;border-radius:8px;font-size:.82rem;cursor:pointer;font-family:inherit}
    .result-list{display:flex;flex-direction:column;gap:14px}
    .result-card{background:#fff;border:1px solid #dbeafe;border-radius:14px;overflow:hidden}
    .result-card__hd{display:flex;align-items:center;gap:10px;padding:13px 16px;cursor:pointer;transition:background .15s;background:#f8faff}
    .result-card__hd:hover{background:#eff6ff}
    .result-card__date{font-size:.78rem;font-weight:700;color:#2563eb;white-space:nowrap}
    .result-card__preview{flex:1;font-size:.85rem;color:#374151;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    .result-card__body{display:none;padding:16px;border-top:1px solid #dbeafe}
    .result-card__body.open{display:block}
    .result-card__content{font-size:.88rem;color:#374151;line-height:1.9;white-space:pre-wrap;margin-bottom:12px}
    .result-card__imgs{display:grid;grid-template-columns:repeat(auto-fill,minmax(90px,1fr));gap:4px;border-radius:8px;overflow:hidden;margin-top:8px}
    .result-card__img{width:100%;aspect-ratio:1;object-fit:cover;cursor:pointer;transition:opacity .15s}
    .result-card__img:hover{opacity:.85}
    .result-card__videos{display:flex;flex-direction:column;gap:10px;margin-top:12px}
    .result-card__video{width:100%;aspect-ratio:16/9;border:none;border-radius:8px}
    .result-card__del{font-size:.75rem;color:#ef4444;background:none;border:1px solid #fca5a5;border-radius:6px;padding:2px 8px;cursor:pointer;font-family:inherit;margin-top:8px}
    .result-empty{text-align:center;padding:28px;color:#9ca3af;font-size:.88rem}
    .result-status{font-size:.78rem;text-align:center;padding:5px;border-radius:7px;display:none;margin-top:4px}
    .result-status.loading{display:block;background:#dbeafe;color:#1e40af}
    .result-status.error{display:block;background:#fee2e2;color:#991b1b}
    /* 하위 게시판 */
    .subboard{margin-top:0}
    .subboard__title{font-size:1rem;font-weight:900;color:#1a1a2e;margin-bottom:16px;display:flex;align-items:center;gap:8px}
    .subboard__add-btn{margin-left:auto;padding:6px 14px;background:#2563eb;color:#fff;border:none;border-radius:8px;font-size:.8rem;font-weight:700;cursor:pointer;font-family:inherit}
    .subboard__add-btn:hover{background:#1d4ed8}
    .subboard__form{background:#f0f7ff;border-radius:12px;padding:18px;margin-bottom:16px;display:none}
    .subboard__form.open{display:block;animation:fadeUp .2s ease}
    @keyframes fadeUp{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
    .subboard__posts{display:flex;flex-direction:column;gap:12px}
    .subpost{background:#fff;border:1px solid #dbeafe;border-radius:14px;overflow:hidden}
    .subpost__hd{display:flex;align-items:center;gap:10px;padding:14px 16px;cursor:pointer;transition:background .15s}
    .subpost__hd:hover{background:#f0f7ff}
    .subpost__title{flex:1;font-size:.9rem;font-weight:700;color:#1a1a2e}
    .subpost__date{font-size:.74rem;color:#9ca3af;white-space:nowrap}
    .subpost__body{border-top:1px solid #dbeafe;padding:16px;display:none}
    .subpost__body.open{display:block}
    .subpost__content{font-size:.88rem;color:#374151;line-height:1.9;white-space:pre-wrap;margin-bottom:10px}
    .subpost__imgs{display:grid;grid-template-columns:repeat(auto-fill,minmax(90px,1fr));gap:4px;border-radius:8px;overflow:hidden;margin-top:8px}
    .subpost__img{width:100%;aspect-ratio:1;object-fit:cover;cursor:pointer;transition:opacity .15s}
    .subpost__img:hover{opacity:.85}
    .subpost__del{font-size:.75rem;color:#ef4444;background:none;border:1px solid #fca5a5;border-radius:6px;padding:2px 8px;cursor:pointer;font-family:inherit;margin-top:8px}
    .subpost-empty{text-align:center;padding:28px;color:#9ca3af;font-size:.88rem}
    /* admin panel */
    .admin-panel{background:#fff;border-radius:24px;width:100%;max-width:600px;max-height:90vh;overflow-y:auto;box-shadow:0 16px 60px rgba(0,0,0,.2)}
    .admin-panel__hd{display:flex;align-items:center;justify-content:space-between;padding:24px 28px 0}
    .admin-panel__title{font-size:1.1rem;font-weight:900;color:#1a1a2e}
    .admin-panel__close{background:none;border:none;font-size:1.4rem;cursor:pointer;color:#6b7280;padding:4px;line-height:1}
    .admin-panel__body{padding:20px 28px 28px}
    .aform{display:flex;flex-direction:column;gap:14px}
    .aform label{font-size:.8rem;font-weight:700;color:#6b7280;display:block;margin-bottom:4px}
    .aform input,.aform textarea,.aform select{width:100%;padding:10px 14px;border:2px solid #e5e7eb;border-radius:10px;font-size:.9rem;font-family:inherit;outline:none;transition:border-color .2s;background:#fff;box-sizing:border-box}
    .aform input:focus,.aform textarea:focus,.aform select:focus{border-color:#2563eb}
    .aform textarea{height:100px;resize:vertical;line-height:1.7}
    .aform__row2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
    .aform__row3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
    .aform__submit{padding:12px;background:#2563eb;color:#fff;border:none;border-radius:10px;font-size:.9rem;font-weight:700;cursor:pointer;font-family:inherit}
    .aform__submit:hover{background:#1d4ed8}
    .aform__submit:disabled{background:#93c5fd;cursor:not-allowed}
    .adivider{border:none;border-top:1px solid #eff6ff;margin:18px 0}
    .alist{display:flex;flex-direction:column;gap:8px}
    .aitem{display:flex;align-items:center;gap:10px;padding:8px 12px;background:#eff6ff;border-radius:8px;font-size:.85rem}
    .aitem__date{color:#2563eb;font-weight:700;white-space:nowrap;font-size:.78rem}
    .aitem__cat{font-size:.72rem;background:#dbeafe;color:#1d4ed8;padding:1px 7px;border-radius:12px;font-weight:700;white-space:nowrap}
    .aitem__title{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:#1a1a2e}
    .aitem__edit{background:none;border:1px solid #93c5fd;color:#2563eb;border-radius:6px;padding:2px 8px;font-size:.75rem;cursor:pointer;white-space:nowrap;font-family:inherit}
    .aitem__edit:hover{background:#eff6ff}
    .aitem__del{background:none;border:1px solid #fca5a5;color:#ef4444;border-radius:6px;padding:2px 8px;font-size:.75rem;cursor:pointer;white-space:nowrap;font-family:inherit}
    .aitem__del:hover{background:#fee2e2}
    .save-status{font-size:.82rem;text-align:center;padding:6px;border-radius:8px;display:none;margin-bottom:4px}
    .save-status.success{display:block;background:#dcfce7;color:#166534}
    .save-status.error{display:block;background:#fee2e2;color:#991b1b}
    .save-status.loading{display:block;background:#dbeafe;color:#1e40af}
    /* 카테고리 관리 */
    .cat-manage{background:#f0f7ff;border-radius:12px;padding:14px 16px;margin-bottom:14px}
    .cat-manage__label{font-size:.78rem;font-weight:700;color:#6b7280;margin-bottom:10px;display:block}
    .cat-tags{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:10px}
    .cat-tag{display:flex;align-items:center;gap:4px;font-size:.78rem;font-weight:700;padding:4px 10px;border-radius:20px;background:#dbeafe;color:#1d4ed8}
    .cat-tag__del{cursor:pointer;font-size:.7rem;opacity:.6;border:none;background:none;color:inherit;padding:0;line-height:1}
    .cat-tag__del:hover{opacity:1}
    .cat-add-row{display:flex;gap:8px}
    .cat-add-input{flex:1;padding:7px 12px;border:1.5px solid #dbeafe;border-radius:8px;font-size:.85rem;font-family:inherit;outline:none;background:#fff}
    .cat-add-input:focus{border-color:#2563eb}
    .cat-add-btn{padding:7px 14px;background:#2563eb;color:#fff;border:none;border-radius:8px;font-size:.82rem;font-weight:700;cursor:pointer;font-family:inherit;white-space:nowrap}
    .cat-add-btn:hover{background:#1d4ed8}
    .modal-overlay{position:fixed;inset:0;background:rgba(26,26,46,.55);backdrop-filter:blur(4px);z-index:600;display:flex;align-items:center;justify-content:center;padding:20px;opacity:0;pointer-events:none;transition:opacity .25s}
    .modal-overlay.open{opacity:1;pointer-events:auto}
    .pw-modal{background:#fff;border-radius:20px;padding:40px;width:100%;max-width:360px;text-align:center;box-shadow:0 16px 60px rgba(0,0,0,.2)}
    .pw-modal__icon{font-size:2.5rem;margin-bottom:14px}
    .pw-modal__title{font-size:1.1rem;font-weight:900;margin-bottom:6px;color:#1a1a2e}
    .pw-modal__sub{font-size:.85rem;color:#6b7280;margin-bottom:20px}
    .pw-modal__input{width:100%;padding:11px 14px;border:2px solid #e5e7eb;border-radius:10px;font-size:1rem;font-family:inherit;outline:none;margin-bottom:10px;transition:border-color .2s;box-sizing:border-box}
    .pw-modal__input:focus{border-color:#2563eb}
    .pw-modal__error{font-size:.8rem;color:#ef4444;margin-bottom:8px}
    .pw-modal__btn{width:100%;padding:12px;background:#2563eb;color:#fff;border:none;border-radius:10px;font-size:.9rem;font-weight:700;cursor:pointer;font-family:inherit}
    .pw-modal__btn:hover{background:#1d4ed8}
    .admin-fab{position:fixed;bottom:32px;right:32px;width:52px;height:52px;border-radius:50%;background:#2563eb;color:#fff;font-size:1.2rem;border:none;cursor:pointer;box-shadow:0 4px 20px rgba(37,99,235,.4);z-index:500;display:flex;align-items:center;justify-content:center;transition:background .2s,transform .2s}
    .admin-fab:hover{background:#1d4ed8;transform:scale(1.08)}
    .sbform{display:flex;flex-direction:column;gap:10px}
    .sbform label{font-size:.78rem;font-weight:700;color:#6b7280;display:block;margin-bottom:3px}
    .sbform input,.sbform textarea{width:100%;padding:9px 12px;border:2px solid #dbeafe;border-radius:9px;font-size:.88rem;font-family:inherit;outline:none;transition:border-color .2s;background:#fff;box-sizing:border-box}
    .sbform input:focus,.sbform textarea:focus{border-color:#2563eb}
    .sbform textarea{height:90px;resize:vertical;line-height:1.7}
    .sbform__btns{display:flex;gap:8px;justify-content:flex-end}
    .sbform__submit{padding:8px 18px;background:#2563eb;color:#fff;border:none;border-radius:8px;font-size:.82rem;font-weight:700;cursor:pointer;font-family:inherit}
    .sbform__cancel{padding:8px 14px;background:#f3f4f6;color:#6b7280;border:none;border-radius:8px;font-size:.82rem;cursor:pointer;font-family:inherit}
    .sb-status{font-size:.78rem;text-align:center;padding:5px;border-radius:7px;display:none}
    .sb-status.loading{display:block;background:#dbeafe;color:#1e40af}
    .sb-status.error{display:block;background:#fee2e2;color:#991b1b}
    .form-mode-badge{display:inline-block;font-size:.75rem;font-weight:700;padding:3px 10px;border-radius:20px;background:#fef3c7;color:#92400e;margin-bottom:12px}
    @media(max-width:600px){.pg-grid{grid-template-columns:1fr}.aform__row2,.aform__row3{grid-template-columns:1fr}.admin-panel,.detail-panel{border-radius:16px 16px 0 0}.detail-overlay{align-items:flex-end;padding:0}.detail-tabs{overflow-x:auto}}
  </style>
</head>
<body>
  <header class="header scrolled" id="header">
    <div class="container header__inner">
      <a href="index.html" class="header__logo">
        <img src="images/logo.png" alt="강화 포도책방" class="header__logo-img" />
        <span class="header__logo-text">강화포도책방</span>
      </a>
      <nav class="header__nav" id="headerNav">
        <a href="index.html#news">소식</a>
        <a href="journal.html">책방일지</a>
        <a href="program.html" class="active">프로그램</a>
        <a href="story.html">나의 책방이야기</a>
        <a href="market.html">오이장터</a>
        <a href="board.html">게시판</a>
        <a href="index.html#pricing">입점</a>
      </nav>
      <div class="header__actions"><a href="index.html#pricing" class="btn btn--outline">점주 신청</a></div>
      <button class="header__toggle" id="menuToggle" aria-label="메뉴 열기"><span></span><span></span><span></span></button>
    </div>
  </header>

  <section class="pg-hero">
    <div class="container">
      <p class="pg-hero__eye">Program</p>
      <h1 class="pg-hero__title">🎓 프로그램</h1>

  <script src="script.js"></script>
  <script src="js/admin-common.js"></script>
  <script>
  (function(){
    const PATH = 'data/programs.json';
    const BASE = 'https://podobooks-ganghwa.github.io/ganghwa';
    const DEFAULT_CATS = ['재능나눔','이웃살이','함께보기','신바람 동네책방'];
    let allItems = [];
    let allCats = [...DEFAULT_CATS];
    let curDetailId = null;
    let editId = null; // 수정 중인 프로그램 ID
    let resultUploader = null;
    let sbFiles = [];

    document.getElementById('fDate').value = new Date().toISOString().slice(0,10);
    resultUploader = AC.createUploader('resultImgUploader');
    // pgImgUploader는 writeForm이 열릴 때 생성
    let pgUploader = AC.createUploader('pgImgUploader');

    const statusLabel = { open:'모집중', full:'마감', done:'종료' };
    const statusClass = { open:'open', full:'full', done:'done' };

    // ─── 카테고리 ───
    function renderCatTags() {
      const wrap = document.getElementById('catTagList');
      wrap.innerHTML = allCats.map((c,i) => `
        <span class="cat-tag">${AC.esc(c)}
          <button class="cat-tag__del" onclick="removeCategory(${i})" title="삭제">✕</button>
        </span>`).join('');
      const sel = document.getElementById('fCategory');
      const prev = sel.value;
      sel.innerHTML = allCats.map(c=>`<option value="${AC.esc(c)}">${AC.esc(c)}</option>`).join('');
      if (allCats.includes(prev)) sel.value = prev;
    }

    window.addCategory = async function() {
      const inp = document.getElementById('newCatInp');
      const name = inp.value.trim();
      if (!name || allCats.includes(name)) { inp.focus(); return; }
      allCats = [...allCats, name];
      inp.value = '';
      renderCatTags();
      await saveCats();
    };

    window.removeCategory = async function(idx) {
      if (!confirm(`'${allCats[idx]}' 카테고리를 삭제할까요?`)) return;
      allCats.splice(idx,1);
      renderCatTags();
      await saveCats();
    };

    async function saveCats() {
      try {
        const data = await AC.fetchJSON(PATH);
        data.categories = allCats;
        await AC.saveJSON(PATH, data, '카테고리 업데이트');
      } catch(e) { console.warn('카테고리 저장 실패:', e.message); }
    }

    // ─── 데이터 로드 ───
    async function load() {
      const data = await AC.fetchJSON(PATH);
      allItems = (data && data.programs) || [];
      if (data && data.categories && data.categories.length) {
        allCats = data.categories;
      }
      renderCatTags();
      renderFeed(allItems);
      return allItems;
    }

    // ─── 카드 목록 렌더 ───
    function renderFeed(items) {
      const feed = document.getElementById('pgFeed');
      if (!items.length) {
        feed.innerHTML = `<div class="pg-empty"><div class="pg-empty__icon">🎓</div><p>등록된 프로그램이 없어요.<br/>곧 알찬 프로그램을 준비할게요!</p></div>`;
        return;
      }
      const sorted = [...items].sort((a,b) => b.date.localeCompare(a.date));
      feed.innerHTML = sorted.map(p => `
        <article class="prog-card" onclick="openDetail('${p.id}')">
          <div style="display:flex;align-items:center;gap:8px;margin-bottom:12px">
            <div class="prog-card__status prog-card__status--${statusClass[p.status]||'open'}">${selCircle(p.status)} ${statusLabel[p.status]||'모집중'}</div>
            <span class="prog-card__cat">${AC.esc(p.category||p.emoji||'기타')}</span>
          </div>
          <div class="prog-card__title">${AC.esc(p.title)}</div>
          <div class="prog-card__datetime" style="margin-bottom:10px">${fmtDateTime(p.date,p.time)}${p.place?' · '+AC.esc(p.place):''}</div>
          <div class="prog-card__desc">${AC.esc(p.description)}</div>
          <div class="prog-card__footer">
            ${p.fee?`<span class="prog-card__tag">💰 ${AC.esc(p.fee)}</span>`:''}
            ${p.capacity?`<span class="prog-card__tag">👥 ${AC.esc(p.capacity)}</span>`:''}
          </div>
          <button class="prog-card__detail-btn">자세히 보기 →</button>
          <div class="prog-card__posts-count">소식 ${(p.posts||[]).length}개 · 진행결과 ${(p.results||[]).length}건</div>
        </article>`).join('');
    }

    function selCircle(s){ return s==='open'?'🟢':s==='full'?'🔴':'⚫'; }

    function fmtDateTime(date, time) {
      if (!date) return '';
      const d = new Date(date+'T00:00:00');
      const ds = d.toLocaleDateString('ko-KR',{month:'long',day:'numeric',weekday:'short'});
      return time ? ds+' '+time : ds;
    }

    // ─── 탭 전환 ───
    window.switchTab = function(tab) {
      document.querySelectorAll('.detail-tab').forEach(el => el.classList.remove('active'));
      document.querySelectorAll('.detail-pane').forEach(el => el.classList.remove('active'));
      const tabBtns = document.querySelectorAll('.detail-tab');
      const tabs = ['info','apply','result','news'];
      const idx = tabs.indexOf(tab);
      if (idx >= 0) tabBtns[idx].classList.add('active');
      const pane = document.getElementById('pane-'+tab);
      if (pane) pane.classList.add('active');
    };

    // ─── 상세 모달 ───
    window.openDetail = function(id) {
      const p = allItems.find(x => x.id === id);
      if (!p) return;
      curDetailId = id;

      document.getElementById('detailStatus').textContent = `${selCircle(p.status)} ${statusLabel[p.status]||'모집중'}`;
      document.getElementById('detailCat').textContent = p.category || p.emoji || '기타';
      document.getElementById('detailTitle').textContent = p.title;
      document.getElementById('detailMeta').innerHTML = [
        p.date ? `📅 ${fmtDateTime(p.date, p.time)}` : '',
        p.place ? `📍 ${AC.esc(p.place)}` : '',
        p.fee ? `💰 ${AC.esc(p.fee)}` : '',
        p.capacity ? `👥 ${AC.esc(p.capacity)}` : '',
        p.contact ? `📞 ${AC.esc(p.contact)}` : '',
      ].filter(Boolean).map(s=>`<span>${s}</span>`).join('');
      document.getElementById('detailDesc').textContent = p.description || '';
      const tags = [p.fee?`💰 ${p.fee}`:'', p.capacity?`👥 ${p.capacity}`:'', p.contact?`📞 ${p.contact}`:''].filter(Boolean);
      document.getElementById('detailTags').innerHTML = tags.map(t=>`<span class="detail-info__tag">${AC.esc(t)}</span>`).join('');
      const imgs = p.images||[];
      document.getElementById('detailImgs').innerHTML = imgs.map(path=>`<img class="detail-info__img" src="${BASE}/${path}" alt="" onclick="acOpenImg('${BASE}/${path}')" />`).join('');

      // 신청란
      renderApplyContent(p.application||'');

      // 진행결과
      renderResults(p.results||[]);

      // 소식
      renderSubPosts(p.posts||[]);

      // 어드민 버튼 표시
      const hasToken = !!AC.getToken();
      document.getElementById('applyEditTrigger').style.display = hasToken ? '' : 'none';
      document.getElementById('resultAddBtn').style.display = hasToken ? '' : 'none';
      document.getElementById('sbAddBtn').style.display = hasToken ? '' : 'none';

      // 탭 초기화
      switchTab('info');
      document.getElementById('sbForm').classList.remove('open');
      document.getElementById('applyEditForm').classList.remove('open');
      document.getElementById('resultForm').classList.remove('open');
      document.getElementById('detailPanel').scrollTop = 0;
      document.getElementById('detailOverlay').classList.add('open');
      document.body.style.overflow = 'hidden';
    };

    document.getElementById('detailClose').addEventListener('click', closeDetail);
    document.getElementById('detailOverlay').addEventListener('click', e => { if(e.target.id==='detailOverlay') closeDetail(); });
    function closeDetail() {
      document.getElementById('detailOverlay').classList.remove('open');
      document.body.style.overflow = '';
      curDetailId = null;
    }

    // ─── 신청란 ───
    function renderApplyContent(text) {
      const box = document.getElementById('applyContent');
      if (text) {
        box.innerHTML = `<div class="apply-box__content">${AC.esc(text)}</div>`;
      } else {
        box.innerHTML = `<span class="apply-empty">신청 안내가 준비 중이에요. 곧 업데이트될 예정입니다.</span>`;
      }
    }

    document.getElementById('applyEditTrigger').addEventListener('click', () => {
      const p = allItems.find(x=>x.id===curDetailId);
      document.getElementById('applyTextarea').value = p ? (p.application||'') : '';
      document.getElementById('applyEditForm').classList.add('open');
    });
    document.getElementById('applyCancelBtn').addEventListener('click', () => {
      document.getElementById('applyEditForm').classList.remove('open');
    });
    document.getElementById('applySaveBtn').addEventListener('click', async () => {
      const text = document.getElementById('applyTextarea').value.trim();
      const setS = (t,m)=>{ const el=document.getElementById('applyStatus'); el.className='result-status '+t; el.textContent=m; };
      setS('loading','저장 중…');
      try {
        const data = await AC.fetchJSON(PATH);
        const items = data.programs||[];
        const prog = items.find(x=>x.id===curDetailId);
        if (!prog) throw new Error('프로그램을 찾을 수 없어요');
        prog.application = text;
        await AC.saveJSON(PATH,{...data,programs:items},'신청란 업데이트');
        allItems = items;
        renderApplyContent(text);
        document.getElementById('applyEditForm').classList.remove('open');
        setS('loading','');
      } catch(e) {
        setS('error','오류: '+e.message);
        if(e.message==='NO_TOKEN') AC.promptToken();
      }
    });

    // ─── 진행결과 ───
    function renderResults(results) {
      const list = document.getElementById('resultList');
      if (!results.length) {
        list.innerHTML = '<div class="result-empty">아직 등록된 진행결과가 없어요 🌱</div>';
        return;
      }
      const sorted = [...results].sort((a,b)=>b.date.localeCompare(a.date));
      list.innerHTML = sorted.map((r,i) => {
        const videoEmbeds = (r.videoUrls||[]).map(url => {
          const ytId = getYoutubeId(url);
          if (ytId) return `<iframe class="result-card__video" src="https://www.youtube.com/embed/${ytId}" allowfullscreen></iframe>`;
          return `<a href="${AC.esc(url)}" target="_blank" style="font-size:.82rem;color:#2563eb;display:block;word-break:break-all">${AC.esc(url)}</a>`;
        }).join('');
        return `
        <div class="result-card">
          <div class="result-card__hd" onclick="togResult(${i})">
            <span class="result-card__date">${r.date||''}</span>
            <span class="result-card__preview">${AC.esc(r.content.slice(0,40))}${r.content.length>40?'…':''}</span>
            <span style="font-size:.8rem;color:#9ca3af">▼</span>
          </div>
          <div class="result-card__body" id="rc-body-${i}">
            <div class="result-card__content">${AC.esc(r.content)}</div>
            ${(r.images||[]).length?`<div class="result-card__imgs">${r.images.map(p=>`<img class="result-card__img" src="${BASE}/${p}" alt="" onclick="acOpenImg('${BASE}/${p}')" />`).join('')}</div>`:''}
            ${videoEmbeds?`<div class="result-card__videos">${videoEmbeds}</div>`:''}
            <button class="result-card__del" onclick="delResult('${r.id}')">삭제</button>
          </div>
        </div>`;
      }).join('');
    }

    window.togResult = i => {
      const el = document.getElementById(`rc-body-${i}`);
      el.classList.toggle('open');
    };

    function getYoutubeId(url) {
      const m = url.match(/(?:youtu\.be\/|youtube\.com\/(?:watch\?v=|embed\/|shorts\/))([A-Za-z0-9_-]{11})/);
      return m ? m[1] : null;
    }

    document.getElementById('resultAddBtn').addEventListener('click', () => {
      document.getElementById('resultForm').classList.add('open');
    });
    document.getElementById('resultCancelBtn').addEventListener('click', () => {
      document.getElementById('resultForm').classList.remove('open');
    });
    document.getElementById('resultSubmitBtn').addEventListener('click', async () => {
      const content = document.getElementById('resultContent').value.trim();
      if (!content) { alert('내용을 입력해주세요'); return; }
      const btn = document.getElementById('resultSubmitBtn');
      btn.disabled = true;
      const videoRaw = document.getElementById('resultVideos').value.trim();
      const videoUrls = videoRaw ? videoRaw.split('\n').map(l=>l.trim()).filter(Boolean) : [];
      const setS = (t,m)=>{ const el=document.getElementById('resultStatus'); el.className='result-status '+t; el.textContent=m; };
      setS('loading','저장 중…');
      try {
        const files = resultUploader ? resultUploader.getFiles() : [];
        let images = [];
        if (files.length) {
          setS('loading','사진 업로드 중…');
          images = await AC.uploadImgs(files,'programs',msg=>setS('loading',msg));
        }
        const data = await AC.fetchJSON(PATH);
        const items = data.programs||[];
        const prog = items.find(x=>x.id===curDetailId);
        if (!prog) throw new Error('프로그램을 찾을 수 없어요');
        if (!prog.results) prog.results = [];
        prog.results.push({ id:Date.now().toString(), content, images, videoUrls, date:new Date().toISOString().slice(0,10) });
        setS('loading','저장 중…');
        await AC.saveJSON(PATH,{...data,programs:items},'진행결과 추가');
        AC.downloadBackup({programs:items},'프로그램');
        allItems = items;
        document.getElementById('resultContent').value = '';
        document.getElementById('resultVideos').value = '';
        if (resultUploader) resultUploader.reset();
        document.getElementById('resultForm').classList.remove('open');
        renderResults(prog.results);
        renderFeed(allItems);
        setS('loading','');
      } catch(e) {
        setS('error','오류: '+e.message);
        if(e.message==='NO_TOKEN') AC.promptToken();
      } finally { btn.disabled = false; }
    });

    window.delResult = async function(rId) {
      if (!confirm('삭제할까요?')) return;
      try {
        const data = await AC.fetchJSON(PATH);
        const items = data.programs||[];
        const prog = items.find(x=>x.id===curDetailId);
        if (!prog) return;
        prog.results = (prog.results||[]).filter(r=>r.id!==rId);
        await AC.saveJSON(PATH,{...data,programs:items},'진행결과 삭제');
        AC.downloadBackup({programs:items},'프로그램');
        allItems = items;
        renderResults(prog.results);
        renderFeed(allItems);
      } catch(e) { alert('오류: '+e.message); }
    };

    // ─── 하위 게시판 (소식) ───
    function renderSubPosts(posts) {
      const container = document.getElementById('sbPosts');
      if (!posts.length) {
        container.innerHTML = '<div class="subpost-empty">아직 등록된 소식이 없어요 🌱</div>';
        return;
      }
      const sorted = [...posts].sort((a,b)=>b.date.localeCompare(a.date));
      container.innerHTML = sorted.map((post,i) => `
        <div class="subpost">
          <div class="subpost__hd" onclick="togSub(${i})">
            <span class="subpost__title">${AC.esc(post.title)}</span>
            <span class="subpost__date">${post.date||''}</span>
          </div>
          <div class="subpost__body" id="sb-body-${i}">
            <div class="subpost__content">${AC.esc(post.content)}</div>
            ${(post.images||[]).length?`<div class="subpost__imgs">${post.images.map(p=>`<img class="subpost__img" src="${BASE}/${p}" alt="" onclick="acOpenImg('${BASE}/${p}')" />`).join('')}</div>`:''}
            <button class="subpost__del" onclick="delSubPost('${post.id}')">삭제</button>
          </div>
        </div>`).join('');
    }

    window.togSub = i => { document.getElementById(`sb-body-${i}`).classList.toggle('open'); };

    const sbInput = document.getElementById('sbImgInput');
    const sbZone  = document.getElementById('sbImgZone');
    const sbStrip = document.getElementById('sbImgStrip');
    function refreshSbStrip() {
      sbStrip.innerHTML = sbFiles.map((f,i) => {
        const url = URL.createObjectURL(f);
        return `<div style="position:relative;width:64px;height:64px;border-radius:7px;overflow:hidden;border:2px solid #dbeafe"><img src="${url}" style="width:100%;height:100%;object-fit:cover" /><button type="button" style="position:absolute;top:2px;right:2px;width:16px;height:16px;border-radius:50%;background:rgba(0,0,0,.65);color:#fff;border:none;cursor:pointer;font-size:.55rem;display:flex;align-items:center;justify-content:center;padding:0" onclick="sbRmImg(${i})">✕</button></div>`;
      }).join('');
    }
    window.sbRmImg = i => { sbFiles.splice(i,1); refreshSbStrip(); };
    sbInput.addEventListener('change', () => { sbFiles=[...sbFiles,...Array.from(sbInput.files)]; sbInput.value=''; refreshSbStrip(); });
    sbZone.addEventListener('dragover', e=>{e.preventDefault();sbZone.style.borderColor='#2563eb';});
    sbZone.addEventListener('dragleave', ()=>{sbZone.style.borderColor='#dbeafe';});
    sbZone.addEventListener('drop', e=>{e.preventDefault();sbZone.style.borderColor='#dbeafe';sbFiles=[...sbFiles,...Array.from(e.dataTransfer.files).filter(f=>f.type.startsWith('image/'))];refreshSbStrip();});

    document.getElementById('sbAddBtn').addEventListener('click', () => {
      if (!AC.getToken()) { AC.promptToken(); return; }
      document.getElementById('sbForm').classList.add('open');
    });
    document.getElementById('sbCancelBtn').addEventListener('click', () => {
      document.getElementById('sbForm').classList.remove('open');
    });

    document.getElementById('sbWriteForm').addEventListener('submit', async e => {
      e.preventDefault();
      const btn = e.target.querySelector('.sbform__submit');
      btn.disabled = true;
      const setS = (t,m) => { const el=document.getElementById('sbStatus'); el.className='sb-status '+t; el.textContent=m; };
      setS('loading', sbFiles.length?'사진 업로드 중…':'저장 중…');
      try {
        const images = sbFiles.length ? await AC.uploadImgs(sbFiles,'programs',msg=>setS('loading',msg)) : [];
        const post = { id:Date.now().toString(), title:document.getElementById('sbTitle').value.trim(), content:document.getElementById('sbContent').value.trim(), date:new Date().toISOString().slice(0,10), images };
        setS('loading','저장 중…');
        const data = await AC.fetchJSON(PATH);
        const items = data.programs||[];
        const prog = items.find(x=>x.id===curDetailId);
        if (!prog) throw new Error('프로그램을 찾을 수 없어요');
        if (!prog.posts) prog.posts = [];
        prog.posts.push(post);
        await AC.saveJSON(PATH,{...data,programs:items},`프로그램 소식 추가`);
        AC.downloadBackup({programs:items},'프로그램');
        allItems = items;
        setS('loading','');
        document.getElementById('sbWriteForm').reset();
        sbFiles = []; refreshSbStrip();
        document.getElementById('sbForm').classList.remove('open');
        renderSubPosts(prog.posts);
        renderFeed(allItems);
        renderAdminList(allItems);
      } catch(err) {
        setS('error','오류: '+err.message);
        if (err.message==='NO_TOKEN') AC.promptToken();
      } finally { btn.disabled = false; }
    });

    window.delSubPost = async function(postId) {
      if (!confirm('삭제할까요?')) return;
      const data = await AC.fetchJSON(PATH);
      const items = data.programs||[];
      const prog = items.find(x=>x.id===curDetailId);
      if (!prog) return;
      prog.posts = (prog.posts||[]).filter(p=>p.id!==postId);
      await AC.saveJSON(PATH,{...data,programs:items},`프로그램 소식 삭제`);
      AC.downloadBackup({programs:items},'프로그램');
      allItems = items;
      renderSubPosts(prog.posts);
      renderFeed(allItems);
    };

    // ─── 관리자 패널 목록 ───
    function renderAdminList(items) {
      const list = document.getElementById('adminList');
      if (!items.length) { list.innerHTML = '<p style="font-size:.82rem;color:#9ca3af;text-align:center;padding:10px">등록된 프로그램이 없어요</p>'; return; }
      const sorted = [...items].sort((a,b)=>b.date.localeCompare(a.date));
      list.innerHTML = sorted.map(p=>`
        <div class="aitem">
          <span class="aitem__date">${p.date}</span>
          <span class="aitem__cat">${AC.esc(p.category||p.emoji||'기타')}</span>
          <span class="aitem__title">${AC.esc(p.title)}</span>
          <button class="aitem__edit" onclick="startEdit('${p.id}')">편집</button>
          <button class="aitem__del" onclick="delItem('${p.id}')">삭제</button>
        </div>`).join('');
    }

    // ─── 수정 모드 ───
    window.startEdit = function(id) {
      const p = allItems.find(x=>x.id===id);
      if (!p) return;
      editId = id;
      // 폼 채우기
      document.getElementById('fCategory').value = p.category || p.emoji || allCats[0];
      document.getElementById('fTitle').value = p.title || '';
      document.getElementById('fStatus').value = p.status || 'open';
      document.getElementById('fDate').value = p.date || '';
      document.getElementById('fTime').value = p.time || '';
      document.getElementById('fPlace').value = p.place || '';
      document.getElementById('fDesc').value = p.description || '';
      document.getElementById('fFee').value = p.fee || '';
      document.getElementById('fCapacity').value = p.capacity || '';
      document.getElementById('fContact').value = p.contact || '';
      document.getElementById('submitBtn').textContent = '수정 완료 ✅';
      document.getElementById('cancelEditBtn').style.display = '';
      document.getElementById('formModeBadge').style.display = '';
      // 폼으로 스크롤
      document.querySelector('.admin-panel').scrollTop = 0;
    };

    function cancelEdit() {
      editId = null;
      document.getElementById('writeForm').reset();
      document.getElementById('fDate').value = new Date().toISOString().slice(0,10);
      if (pgUploader) pgUploader.reset();
      document.getElementById('submitBtn').textContent = '프로그램 등록하기 📤';
      document.getElementById('cancelEditBtn').style.display = 'none';
      document.getElementById('formModeBadge').style.display = 'none';
    }
    window.cancelEdit = cancelEdit;

    window.delItem = async function(id){
      if(!confirm('삭제할까요?')) return;
      AC.setStatus('pgStatus','loading','삭제 중…');
      try {
        const data = await AC.fetchJSON(PATH);
        const items = (data.programs||[]).filter(p=>p.id!==id);
        await AC.saveJSON(PATH,{...data,programs:items},`프로그램 삭제`);
        AC.setStatus('pgStatus','success','삭제 완료!');
        AC.downloadBackup({programs:items},'프로그램');
        allItems = items;
        renderFeed(items); renderAdminList(items);
        if (editId===id) cancelEdit();
      } catch(e){ handleErr(e,'pgStatus'); }
    };

    // ─── 등록/수정 폼 ───
    document.getElementById('writeForm').addEventListener('submit', async e=>{
      e.preventDefault();
      const btn = document.getElementById('submitBtn');
      btn.disabled = true;
      const files = pgUploader ? pgUploader.getFiles() : [];
      try {
        let images = [];
        if (files.length > 0) {
          AC.setStatus('pgStatus','loading',`사진 업로드 중…`);
          images = await AC.uploadImgs(files,'programs',msg=>AC.setStatus('pgStatus','loading',msg));
        }
        const newItem = {
          category: document.getElementById('fCategory').value,
          title: document.getElementById('fTitle').value.trim(),
          date: document.getElementById('fDate').value,
          time: document.getElementById('fTime').value,
          place: document.getElementById('fPlace').value.trim(),
          description: document.getElementById('fDesc').value.trim(),
          fee: document.getElementById('fFee').value.trim(),
          capacity: document.getElementById('fCapacity').value.trim(),
          contact: document.getElementById('fContact').value.trim(),
          status: document.getElementById('fStatus').value,
        };
        AC.setStatus('pgStatus','loading','저장 중…');
        const data = await AC.fetchJSON(PATH);
        let items = data.programs||[];

        if (editId) {
          // 수정
          const idx = items.findIndex(x=>x.id===editId);
          if (idx>=0) {
            const old = items[idx];
            items[idx] = { ...old, ...newItem, images: images.length ? images : (old.images||[]) };
          }
          await AC.saveJSON(PATH,{...data,programs:items},`프로그램 수정: ${newItem.title}`);
          AC.setStatus('pgStatus','success','✅ 수정 완료!');
        } else {
          // 신규
          const item = { id:Date.now().toString(), ...newItem, images, posts:[], results:[], application:'' };
          items = [...items, item];
          await AC.saveJSON(PATH,{...data,programs:items},`프로그램 추가: ${newItem.title}`);
          AC.setStatus('pgStatus','success','✅ 등록 완료!');
        }

        AC.downloadBackup({programs:items},'프로그램');
        cancelEdit();
        allItems = items;
        renderFeed(items); renderAdminList(items);
        setTimeout(()=>AC.setStatus('pgStatus','success','✅ 완료! 1~2분 후 반영됩니다.'),800);
      } catch(e){ handleErr(e,'pgStatus'); }
      finally{ btn.disabled = false; }
    });

    function handleErr(e, sid) {
      if(e.message==='NO_TOKEN'||e.message.includes('401')) {
        AC.setStatus(sid,'error','GitHub 토큰을 입력해주세요');
        AC.promptToken();
      } else {
        AC.setStatus(sid,'error','오류: '+e.message);
      }
    }

    async function openAdmin(){
      document.getElementById('adminOverlay').classList.add('open');
      document.body.style.overflow='hidden';
      const data = await AC.fetchJSON(PATH);
      const items = (data&&data.programs)||[];
      if (data&&data.categories) { allCats=data.categories; renderCatTags(); }
      renderAdminList(items);
    }

    document.getElementById('adminClose').addEventListener('click',()=>{
      document.getElementById('adminOverlay').classList.remove('open');
      document.body.style.overflow='';
    });
    document.getElementById('adminOverlay').addEventListener('click',e=>{
      if(e.target.id==='adminOverlay'){document.getElementById('adminOverlay').classList.remove('open');document.body.style.overflow='';}
    });

    AC.injectModals({ onSuccess: openAdmin });
    load();
  })();
  </script>
</body>
</html>
